<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>COREO - Stage 2 Gym</title>
  <link rel="stylesheet" href="css/tokens.css">
</head>
<body>

  <!-- 極簡 HUD -->
  <div id="hud">
    <div class="hud-group">
      <div class="hud-label">LIGHT CORE</div>
      <div class="hud-value" id="ui-core-val">00</div>
    </div>
  </div>

  <!-- 3D 遊戲世界 -->
  <div id="game-container">
    <div id="fog-overlay"></div>
    <div id="camera-rig">
      <div id="world"></div>
    </div>
  </div>

  <!-- 浮動操控盤接收區 -->
  <div id="joystick-zone">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-knob" id="joystick-knob"></div>
    </div>
  </div>

  <!-- 過關收束動畫 (無 alert) -->
  <div id="level-complete-overlay">
    <div class="lc-title">STAGE SECURED</div>
    <div class="lc-line"></div>
    <div class="hud-label" style="margin-top:20px;">TAP TO RESTART</div>
  </div>

  <script src="js/maze.js"></script>
  <script src="js/control.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/render3d.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
